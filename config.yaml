input_dir: ~   # not needed; triplets are loaded from MongoDB below

mongo:
  uri:          "mongodb://readonly:qabhyk-tuzJeq-fegju6@localhost:27016/boom?authSource=boom"
  database:     boom
  collection:   LSST_alerts_cutouts
  sci_field:    cutoutScience
  sub_field:    cutoutDifference
  ref_field:    cutoutTemplate
  use_embedded: true               # fields contain raw FITS bytes, not file paths
  temp_dir:     /tmp/astro_swiper_cache
  sample_size:  500                # random sample per session; increase if you've classified a lot
  # label_field omitted — connection is read-only; SQLite resume handles skipping

back_button: up
port: 5000

# resume: true  → skip already-classified triplets on startup
# overwrite: true → wipe all saved classifications and start fresh
resume: true
overwrite: false

# ---------------------------------------------------------------------------
# Storage backend — choose one block and comment out the others
# ---------------------------------------------------------------------------

# SQLite (recommended): single file, atomic writes, queryable with pandas
storage:
  backend: sqlite
  db: training_sets/classifications.db

# CSV: single file, human-readable, easy to open in Excel / pandas
# storage:
#   backend: csv
#   file: training_sets/classifications.csv

# Txt: original format, one file per category
# storage:
#   backend: txt
#   already_classified: training_sets/already_classified.txt

# ---------------------------------------------------------------------------
# Keybinds
# ---------------------------------------------------------------------------
# For sqlite and csv backends: values are the label strings stored in the DB/CSV.
# For txt backend: values are the output file paths.
# Quote numeric keys so YAML doesn't parse them as integers.

keybinds:
  a: noise
  c: skips
  d: dots
  e: streaks
  v: badsubs
  w: wide
  x: dipoles
  '1': small
  '2': medium
  '3': large

