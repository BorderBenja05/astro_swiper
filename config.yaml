input_dir: /mnt/waz/nas/turbo/pipeline/rb_cutouts/2026-03-12/

back_button: up
port: 5000

# resume: true  → skip already-classified triplets on startup
# overwrite: true → wipe all saved classifications and start fresh
resume: true
overwrite: false

# ---------------------------------------------------------------------------
# Storage backend — choose one block and comment out the others
# ---------------------------------------------------------------------------

# SQLite (recommended): single file, atomic writes, queryable with pandas
storage:
  backend: sqlite
  db: training_sets/classifications.db

# CSV: single file, human-readable, easy to open in Excel / pandas
# storage:
#   backend: csv
#   file: training_sets/classifications.csv

# Txt: original format, one file per category
# storage:
#   backend: txt
#   already_classified: training_sets/already_classified.txt

# ---------------------------------------------------------------------------
# Keybinds
# ---------------------------------------------------------------------------
# For sqlite and csv backends: values are the label strings stored in the DB/CSV.
# For txt backend: values are the output file paths.
# Quote numeric keys so YAML doesn't parse them as integers.

keybinds:
  a: noise
  c: skips
  d: dots
  e: streaks
  v: badsubs
  w: wide
  x: dipoles
  '1': small
  '2': medium
  '8': large

# --- txt backend example ---
