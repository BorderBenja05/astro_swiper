name: astro_swiper_mobile
description: Mobile Android client for Astro Swiper — classify FITS triplets over SSH.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  dartssh2: ^2.9.0
  socket_io_client: ^3.0.0
  shared_preferences: ^2.3.0
  provider: ^6.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
